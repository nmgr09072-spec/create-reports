<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}日報管理システム{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Hiragino Sans", "Meiryo", sans-serif; background: #f5f6fa; color: #333; }

    /* ナビゲーション */
    nav { background: #2c3e50; padding: 0 24px; display: flex; align-items: center; gap: 4px; }
    nav .brand { color: #ecf0f1; font-size: 16px; font-weight: bold; padding: 14px 16px 14px 0; margin-right: 12px; border-right: 1px solid #4a6278; }
    nav a { color: #bdc3c7; text-decoration: none; padding: 14px 16px; font-size: 14px; display: block; }
    nav a:hover, nav a.active { background: #34495e; color: #fff; }

    /* メインコンテンツ */
    main { max-width: 1000px; margin: 32px auto; padding: 0 20px; }
    h1 { font-size: 22px; margin-bottom: 24px; color: #2c3e50; }
    h2 { font-size: 18px; margin-bottom: 16px; color: #2c3e50; }

    /* カード */
    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); padding: 24px; margin-bottom: 24px; }

    /* フォーム */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 6px; color: #555; }
    input[type="text"], input[type="number"], input[type="date"], input[type="time"], select {
      width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
    }
    .time-group { display: flex; align-items: center; gap: 8px; }
    .time-group input[type="time"] { flex: 1; width: auto; }
    .time-group .sep { white-space: nowrap; color: #555; font-size: 15px; }
    input:focus, select:focus { outline: none; border-color: #4a90d9; box-shadow: 0 0 0 2px rgba(74,144,217,.2); }
    .errorlist { color: #e74c3c; font-size: 13px; margin-top: 4px; list-style: none; }

    /* ボタン */
    .btn { padding: 8px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; }
    .btn-primary { background: #4a90d9; color: #fff; }
    .btn-primary:hover { background: #357abd; }
    .btn-secondary { background: #95a5a6; color: #fff; }
    .btn-secondary:hover { background: #7f8c8d; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-danger:hover { background: #c0392b; }
    .btn-sm { padding: 4px 12px; font-size: 13px; }

    /* テーブル */
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #f0f3f7; padding: 10px 12px; text-align: left; border-bottom: 2px solid #dde3ec; white-space: nowrap; }
    td { padding: 10px 12px; border-bottom: 1px solid #eee; }
    tr:hover td { background: #f9fbff; }
    .text-right { text-align: right; }

    /* フィルターバー */
    .filter-bar { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 16px; }
    .filter-bar .form-group { margin-bottom: 0; flex: 1; min-width: 160px; }

    /* メッセージ */
    .messages { margin-bottom: 16px; }
    .messages li { padding: 10px 16px; border-radius: 4px; list-style: none; background: #d4edda; color: #155724; }
  </style>
</head>
<body>

<nav>
  <span class="brand">📋 日報管理</span>
  <a href="{% url 'reports:index' %}" class="{% block nav_index %}{% endblock %}">＋ 新規入力</a>
  <a href="{% url 'reports:list' %}" class="{% block nav_list %}{% endblock %}">作業記録一覧</a>
  <a href="{% url 'reports:company' %}" class="{% block nav_company %}{% endblock %}">業務日報</a>
  <a href="{% url 'reports:drivers' %}" class="{% block nav_drivers %}{% endblock %}">ドライバー管理</a>
  <a href="/admin/">管理画面</a>
</nav>

<main>
  {% if messages %}
  <ul class="messages">
    {% for message in messages %}
    <li>{{ message }}</li>
    {% endfor %}
  </ul>
  {% endif %}

  {% block content %}{% endblock %}
</main>

</body>
</html>
